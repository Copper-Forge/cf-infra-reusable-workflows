name: SAM Application Deploy

on:
  workflow_call:
    inputs:
      config-env:
        description: SAM config environment (e.g., 'dev', 'prod')
        type: string
        required: true
      account-nickname:
        description: Environment identifier for OIDC role assumption
        type: string
        required: true
      stack-name:
        description: CloudFormation stack name for output resolution
        type: string
        required: true
      sam-directory:
        description: Directory containing samconfig and template files (e.g., 'infra/sam')
        type: string
        default: '.'
        required: false
      config-file:
        description: Path to samconfig.toml (e.g., 'infra/sam/samconfig.toml')
        type: string
        default: 'samconfig.toml'
        required: false
      template-file:
        description: Path to SAM template file (e.g., 'infra/sam/template-node.yaml')
        type: string
        default: 'template.yaml'
        required: false
      aws-region:
        description: AWS region for credentials and SAM deployment
        type: string
        default: 'us-west-2'
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ format('arn:aws:iam::{0}:role/{1}', fromJSON(vars.BASELINE_ACCOUNT_MAPPINGS)[inputs.account-nickname], vars.OIDC_ROLE_NAME) }}
          aws-region: ${{ inputs.aws-region }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: SAM validate
        working-directory: ${{ inputs.sam-directory }}
        run: sam validate \
            --config-env ${{ inputs.config-env }} \
            --config-file ${{ inputs.config-file }} \
            --template-file ${{ inputs.template-file }}

      - name: SAM build
        working-directory: ${{ inputs.sam-directory }}
        run: sam build \
            --config-env ${{ inputs.config-env }} \
            --config-file ${{ inputs.config-file }} \
            --template-file ${{ inputs.template-file }}

      - name: SAM deploy
        working-directory: ${{ inputs.sam-directory }}
        run: sam deploy \
            --config-env ${{ inputs.config-env }} \
            --config-file ${{ inputs.config-file }} \
            --template-file ${{ inputs.template-file }} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Output stack information
        working-directory: ${{ inputs.sam-directory }}
        run: |
          echo "Stack deployed: ${{ inputs.stack-name }}"
          sam list stack-outputs --stack-name ${{ inputs.stack-name }} --output json
