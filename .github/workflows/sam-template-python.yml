name: SAM Application Deploy

on:
  workflow_call:
    inputs:
      config-env:
        description: SAM config environment (e.g., 'dev', 'prod')
        type: string
        required: true
      stack-name:
        description: CloudFormation stack name for output resolution
        type: string
        required: true
      aws-region:
        description: AWS region for credentials and SAM deployment
        type: string
        default: 'us-east-1'
        required: false
      environment-slug:
        description: Environment identifier (e.g., 'dinkapade-dev') for OIDC role assumption
        type: string
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ format('arn:aws:iam::{0}:role/{1}', fromJSON(vars.BASELINE_ACCOUNT_MAPPINGS)[inputs.environment-slug], vars.OIDC_ROLE_NAME) }}
          aws-region: ${{ inputs.aws-region }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: SAM validate
        run: sam validate --config-env ${{ inputs.config-env }}

      - name: SAM build
        run: sam build --config-env ${{ inputs.config-env }}

      - name: SAM deploy
        run: sam deploy --config-env ${{ inputs.config-env }} --no-confirm-changeset --no-fail-on-empty-changeset

      - name: Output stack information
        run: |
          echo "Stack deployed: ${{ inputs.stack-name }}"
          sam list stack-outputs --stack-name ${{ inputs.stack-name }} --output json
