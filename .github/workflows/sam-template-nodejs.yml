name: SAM Application Deploy

on:
  workflow_call:
    inputs:
      config-env:
        description: SAM config environment (e.g., 'dev', 'prod')
        type: string
        required: true
      stack-name:
        description: CloudFormation stack name for output resolution
        type: string
        required: true
      aws-region:
        description: AWS region for credentials and SAM deployment
        type: string
        default: 'us-west-2'
        required: false
      account-nickname:
        description: Environment identifier for OIDC role lookup
        type: string
        required: true
      node-version:
        description: Node.js version for build
        type: string
        default: '24'
        required: false
      working-directory:
        description: Directory containing samconfig and template files (e.g., 'infra/sam')
        type: string
        default: '.'
        required: false
      config-file:
        description: Path to samconfig.toml (e.g., 'infra/sam/samconfig.toml')
        type: string
        default: 'samconfig.toml'
        required: false
      template-file:
        description: Path to SAM template file (e.g., 'infra/sam/template-node.yaml')
        type: string
        default: 'template.yaml'
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ format('arn:aws:iam::{0}:role/{1}', fromJSON(vars.BASELINE_ACCOUNT_MAPPINGS)[inputs.account-nickname], vars.OIDC_ROLE_NAME) }}
          aws-region: ${{ inputs.aws-region }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Build
        working-directory: ${{ inputs.working-directory }}
        run: npm run build

      - name: SAM validate
        working-directory: ${{ inputs.working-directory }}
        run: sam validate --template ${{ inputs.template-file }}

      - name: SAM build
        working-directory: ${{ inputs.working-directory }}
        run: |
          sam build \
              --config-env ${{ inputs.config-env }} \
              --config-file ${{ inputs.config-file }} \
              --template-file ${{ inputs.template-file }}

      - name: SAM deploy
        working-directory: ${{ inputs.working-directory }}
        run: |
          sam deploy \
              --config-env ${{ inputs.config-env }} \
              --config-file ${{ inputs.config-file }} \
              --template-file ${{ inputs.template-file }} \
              --no-confirm-changeset \
              --no-fail-on-empty-changeset

      - name: Check stack status
        if: always()
        id: stack-status
        run: |
          STATUS=$(aws cloudformation describe-stacks \
              --stack-name ${{ inputs.stack-name }} \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo "STACK_NOT_FOUND")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Stack ${{ inputs.stack-name }} status: $STATUS"

      - name: Delete stack in ROLLBACK_COMPLETE
        if: always() && steps.stack-status.outputs.status == 'ROLLBACK_COMPLETE'
        run: |
          echo "Stack is in ROLLBACK_COMPLETE — deleting for clean re-deploy"
          aws cloudformation delete-stack --stack-name ${{ inputs.stack-name }}
          aws cloudformation wait stack-delete-complete --stack-name ${{ inputs.stack-name }}
          echo "Stack deleted"
          exit 1

      - name: Output stack information
        if: success()
        run: |
          echo "Stack deployed: ${{ inputs.stack-name }}"
          sam list stack-outputs --stack-name ${{ inputs.stack-name }} --output json
