name: Terraform Baseline Workflow

on:
  workflow_call:
    inputs:
      state-key-prefix:
        description: Prefix for Terraform state key (e.g., 'security', 'networking')
        type: string
        required: true
      stack-repository:
        description: Repository segment used to resolve the stack tfvars S3 key
        type: string
        required: true
      stack-name:
        description: Stack segment used to resolve the stack tfvars S3 key
        type: string
        required: true
      environment-slug:
        description: Slug to identify the environment/account for lookup
        type: string
        required: true
      working-directory:
        description: Working directory for Terraform commands
        type: string
        default: '.'
        required: false
      aws-region:
        description: AWS region for credentials and Terraform backend access
        type: string
        default: 'us-west-2'
        required: false
      tf_version:
        description: Terraform version to use
        type: string
        default: '1.15.4'
        required: false
      action:
        description: Terraform action to perform
        type: string
        default: 'plan'
        required: false
      
permissions:
  id-token: write
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    env:
      TFVARS_BUCKET: copperforge-terraform-inputs
    steps:
      - name: Resolve environment slug
        run: |
          echo "Resolved environment slug: ${{ inputs.environment-slug }}"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SHARED_SERVICES_OIDC_ARN }}
          aws-region: ${{ inputs.aws-region }}
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download tfvars from S3
        run: |
          set -euo pipefail

          shared_s3_uri="s3://${TFVARS_BUCKET}/${{ inputs.environment-slug }}/terraform.tfvars"
          stack_s3_uri="s3://${TFVARS_BUCKET}/${{ inputs.environment-slug }}/${{ inputs.stack-repository }}/${{ inputs.stack-name }}/terraform.tfvars"
          download_directory="${RUNNER_TEMP}/terraform-baseline/${{ inputs.environment-slug }}/${{ inputs.stack-repository }}/${{ inputs.stack-name }}"
          shared_local_path="${download_directory}/shared.auto.tfvars"
          stack_local_path="${download_directory}/stack.auto.tfvars"

          mkdir -p "${download_directory}"

          echo "Shared tfvars S3 URI: ${shared_s3_uri}"
          echo "Stack tfvars S3 URI: ${stack_s3_uri}"
          echo "Shared tfvars local path: ${shared_local_path}"
          echo "Stack tfvars local path: ${stack_local_path}"

          download_tfvars() {
            local label="$1"
            local s3_uri="$2"
            local local_path="$3"
            local aws_error_log

            aws_error_log="$(mktemp "${RUNNER_TEMP}/terraform-baseline-${label}-aws-error.XXXXXX")"

            if ! aws s3 cp "${s3_uri}" "${local_path}" --only-show-errors 2>"${aws_error_log}"; then
              if grep -Eq '(\(404\)|NoSuchKey|Not Found|does not exist)' "${aws_error_log}"; then
                if [ "${label}" = "shared" ]; then
                  echo "Missing shared tfvars object: ${s3_uri}"
                else
                  echo "Missing stack tfvars object: ${s3_uri}"
                fi
                echo "Ensure the tfvars object exists in S3 before rerunning."
              else
                echo "Failed to download ${label} tfvars object: ${s3_uri}" >&2
                cat "${aws_error_log}" >&2
              fi
              rm -f "${aws_error_log}"
              exit 1
            fi

            rm -f "${aws_error_log}"

            if [ ! -s "${local_path}" ]; then
              echo "Downloaded ${label} tfvars file is missing or empty: ${local_path}"
              exit 1
            fi
          }

          download_tfvars "shared" "${shared_s3_uri}" "${shared_local_path}"
          download_tfvars "stack" "${stack_s3_uri}" "${stack_local_path}"

          {
            echo "TF_SHARED_TFVARS_PATH=${shared_local_path}"
            echo "TF_STACK_TFVARS_PATH=${stack_local_path}"
          } >> "${GITHUB_ENV}"
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}
      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        run: terraform init -backend-config="key=${{ inputs.state-key-prefix }}/${{ inputs.environment-slug }}/terraform.tfstate"
      - name: Terraform Plan
        if: inputs.action == 'plan'
        working-directory: ${{ inputs.working-directory }}
        run: terraform plan -var-file="${TF_SHARED_TFVARS_PATH}" -var-file="${TF_STACK_TFVARS_PATH}"
      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: ${{ inputs.working-directory }}
        run: terraform apply -auto-approve -var-file="${TF_SHARED_TFVARS_PATH}" -var-file="${TF_STACK_TFVARS_PATH}"
