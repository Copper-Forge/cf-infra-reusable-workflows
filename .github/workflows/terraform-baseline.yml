name: Terraform Baseline Workflow

on:
  workflow_call:
    inputs:
      state-key-prefix:
        description: Prefix for Terraform state key (e.g., 'security', 'networking')
        type: string
        required: true
      tfvars-file:
        description: Path to the tfvars file for the selected environment
        type: string
        required: true
      environment-slug:
        description: Slug to identify the environment/account for lookup
        type: string
        required: true
      working-directory:
        description: Working directory for Terraform commands
        type: string
        default: '.'
        required: false
      aws-region:
        description: AWS region for credentials and Terraform backend access
        type: string
        default: 'us-west-2'
        required: false
      tf_version:
        description: Terraform version to use
        type: string
        default: '1.15.4'
        required: false
      action:
        description: Terraform action to perform
        type: string
        default: 'plan'
        required: false
      
permissions:
  id-token: write
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve environment slug
        run: |
          echo "Resolved environment slug: ${{ inputs.environment-slug }}"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SHARED_SERVICES_OIDC_ARN }}
          aws-region: ${{ inputs.aws-region }}
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate tfvars file
        working-directory: "${{ inputs.working-directory }}/"
        run: |
          if [ ! -f "${{ inputs.tfvars-file }}" ]; then
            echo "tfvars file not found: ${{ inputs.tfvars-file }}"
            exit 1
          fi
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}
      - name: Terraform Init
        working-directory: "${{ inputs.working-directory }}/"
        run: terraform init -backend-config="key=${{ inputs.state-key-prefix }}/${{ inputs.environment-slug }}/terraform.tfstate"
      - name: Terraform Plan
        if: inputs.action == 'plan'
        working-directory: "${{ inputs.working-directory }}/"
        run: terraform plan -var-file="${{ inputs.tfvars-file }}"
      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: "${{ inputs.working-directory }}/"
        run: terraform apply -auto-approve -var-file="${{ inputs.tfvars-file }}"
